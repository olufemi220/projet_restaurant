services:
  mysql:
    image: mysql:5.7
    platform: linux/amd64
    container_name: restobar-mysql
    restart: unless-stopped
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-restobar}
      MYSQL_USER: ${MYSQL_USER:-mysql}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - restobar

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: restobar-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    environment:
      DB_USER: ${MYSQL_USER:-mysql}
      DB_HOST: mysql
      DB_NAME: ${MYSQL_DATABASE:-restobar}
      DB_PASSWORD: ${MYSQL_PASSWORD:-secret}
      DB_DIALECT: mysql
      DB_PORT: 3306
      NODE_ENV: production
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-abc123}
    networks:
      - restobar

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: restobar-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-3000}:80"
    networks:
      - restobar

networks:
  restobar:
    driver: bridge

volumes:
  mysql_data:
  backend_uploads:
